# PR CI — 변경 영역만 검사 (web: tsc+build, relay: pytest).
# GitHub-hosted 러너에서 실행하므로 맥미니 self-hosted 러너와 무관하게 항상 동작한다.
# 자세한 규약은 CONTRIBUTING.md 참조.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      relay: ${{ steps.filter.outputs.relay }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
            relay:
              - 'apps/relay-server/**'

  web:
    name: Web (tsc + build)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  relay:
    name: Relay (pytest)
    needs: changes
    if: needs.changes.outputs.relay == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/relay-server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync --dev
      - name: Pytest
        run: uv run python -m pytest -q
